<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Prediction Result | SmartPath</title>
</head>
<body>
    <div class="glass-card" style="max-width: 600px; margin: 50px auto; text-align: center;">
        <h2 style="color: #00d4ff;">Placement Prediction Result</h2>
        <hr style="border: 0.5px solid rgba(0,212,255,0.2); margin: 20px 0;">
        
        <div style="margin: 30px 0;">
            <h3 style="color: #fff;">Job Role: {{ job.job_role_title }}</h3>
            <p style="color: #ccc;">Company ID: {{ job.company_id }}</p>
        </div>

        <div style="width: 150px; height: 150px; border-radius: 50%; border: 8px solid #00d4ff; margin: 0 auto; display: flex; align-items: center; justify-content: center; flex-direction: column;">
            <h1 style="margin: 0; font-size: 40px;">{{ score }}%</h1>
            <p style="margin: 0; font-size: 12px; color: #00d4ff;">Match Score</p>
        </div>

        <div style="margin-top: 30px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px;">
            <p style="font-size: 18px; font-weight: bold; color: {{ '#2ecc71' if score >= 70 else '#f1c40f' if score >= 40 else '#e74c3c' }}">
                {{ message }}
            </p>
        </div>

        <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center;">
            <button onclick="location.href='/dashboard'" style="background: transparent; border: 1px solid #00d4ff;">Back to Jobs</button>
            <button onclick="window.print()" style="background: #00d4ff; color: #000;">Download Report</button>
        </div>
    </div>
</body>
</html>
