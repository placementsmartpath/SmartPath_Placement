<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Company Registration | SmartPath</title>
</head>
<body>
    <div class="glass-card" style="width: 450px;">
        <h2 style="color: #00d4ff; text-align: center;">Register Your Company</h2>
        <form action="/company_register" method="POST">
            <input type="text" name="cname" placeholder="Parent Company Name" required>
            <input type="email" name="email" placeholder="Official Email Address" required>
            <input type="password" name="password" placeholder="Create Password" required>
            
            <div style="display: flex; gap: 10px;">
                <input type="text" name="sector" placeholder="Industry Sector">
                <input type="text" name="website" placeholder="Website (URL)">
            </div>

            <button type="submit" style="margin-top: 20px;">Create Company Account</button>
        </form>
        <p style="text-align: center; margin-top: 15px; font-size: 13px;">
            Already have an account? <a href="/company_login" style="color: #00d4ff;">Login here</a>
        </p>
    </div>
</body>
</html>
