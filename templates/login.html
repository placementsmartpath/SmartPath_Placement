<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPath | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="glass-card" style="max-width: 400px;">
        <h2 style="color: #00d4ff; text-align: center;">Student Login</h2>
        <form action="/login" method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px;">Email Address</label>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px;">Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Login to SmartPath</button>
        </form>
        <p style="text-align: center; margin-top: 20px; font-size: 14px;">
            New user? <a href="/register" style="color: #00d4ff; text-decoration: none;">Create Account</a>
        </p>
    </div>
</body>
</html>
