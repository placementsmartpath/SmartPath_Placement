<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Post Job | SmartPath</title>
</head>
<body>
    <div class="glass-card" style="max-width: 850px; margin: 20px auto;">
        <h2 style="color: #00d4ff; text-align: center;">Post Job Requirement</h2>
        <form action="/post_job" method="POST">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" name="role" placeholder="Job Role Title (e.g. Java Developer)" required>
                <input type="text" name="dept" placeholder="Department Name">
                <input type="number" step="0.01" name="cgpa" placeholder="Min CGPA Required">
                <input type="number" name="backlogs" placeholder="Max Backlogs Allowed">
                <input type="text" name="package" placeholder="Salary Package (LPA)">
                <input type="text" name="location" placeholder="Job Location">
            </div>
            
            <textarea name="skills" placeholder="Mandatory Skills (Python, SQL, etc.)" style="height: 60px; margin-top:10px;"></textarea>
            <textarea name="desc" placeholder="Job Description" style="height: 80px; margin-top:10px;"></textarea>
            
            <button type="submit" style="margin-top: 20px; background: #00d4ff;">Publish Job</button>
        </form>
    </div>
</body>
</html>
