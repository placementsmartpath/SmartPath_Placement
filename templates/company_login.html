<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Company Login | SmartPath</title>
</head>
<body>
    <div class="glass-card" style="width: 380px;">
        <h2 style="color: #00d4ff; text-align: center;">Company Login</h2>
        <form action="/company_login" method="POST">
            <input type="email" name="email" placeholder="Official Email" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <button type="submit" style="margin-top: 20px; background: linear-gradient(90deg, #2ecc71, #27ae60);">
                Login to Dashboard
            </button>
        </form>
        <p style="text-align: center; margin-top: 15px; font-size: 13px;">
            New Company? <a href="/company_register" style="color: #00d4ff;">Register your firm</a>
        </p>
        <br>
        <a href="/" style="display: block; text-align: center; color: #aaa; text-decoration: none; font-size: 12px;">
            ← Back to Home
        </a>
    </div>
</body>
</html>
